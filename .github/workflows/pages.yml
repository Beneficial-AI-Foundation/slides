name: Build and Deploy Slides

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  # Opt into Node.js 24 for GitHub Actions (Node.js 20 deprecated June 2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install elan
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache Lake packages
        uses: actions/cache@v5
        with:
          path: |
            .lake
            ~/.elan/toolchains
          key: lake-${{ hashFiles('lakefile.lean', 'lean-toolchain') }}
          restore-keys: lake-

      - name: Build slides
        run: |
          lake update
          lake build tutorialsMain
          .lake/build/bin/tutorialsMain

      - name: Copy shared lib directory
        run: |
          # Copy lib from one output to root for shared assets
          cp -r _site/categories/lib _site/lib || true

      - name: Create index page
        run: |
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Tutorials</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 600px; margin: 4rem auto; padding: 0 1rem; }
              h1 { border-bottom: 1px solid #ccc; padding-bottom: 0.5rem; }
              ul { list-style: none; padding: 0; }
              li { margin: 1rem 0; }
              a { color: #0066cc; text-decoration: none; font-size: 1.2rem; }
              a:hover { text-decoration: underline; }
              p { color: #666; margin: 0.25rem 0 0 0; }
            </style>
          </head>
          <body>
            <h1>Tutorials</h1>
            <ul>
              <li>
                <a href="categories/">Category Theory</a>
                <p>From sets to categories</p>
              </li>
              <li>
                <a href="monads/">Monads</a>
                <p>Monads in mathematics and programming</p>
              </li>
              <li>
                <a href="double/">Double Categories</a>
                <p>Categories internal to Cat</p>
              </li>
              <li>
                <a href="ssprove/">SSProve</a>
                <p>Modular cryptographic proofs in Coq</p>
              </li>
            </ul>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
